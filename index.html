<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="hero-title">
        <p class="eyebrow">Secure access</p>
        <h1 id="hero-title">Login with clarity and confidence.</h1>
        <p class="hero-copy">
          A focused sign-in experience with a clean form, helpful validation,
          and a visual style that feels deliberate instead of generic.
        </p>

        <div class="stats" aria-label="Key highlights">
          <article>
            <strong>99.9%</strong>
            <span>Availability</span>
          </article>
          <article>
            <strong>2FA</strong>
            <span>Ready</span>
          </article>
          <article>
            <strong>24/7</strong>
            <span>Access</span>
          </article>
        </div>
      </section>

      <section class="card" aria-labelledby="login-title">
        <div class="card-header">
          <h2 id="login-title">Welcome back</h2>
          <p>Use your account credentials to continue.</p>
        </div>

        <form id="loginForm" novalidate>
          <label>
            <span>Email</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </label>

          <label>
            <span>Password</span>
            <div class="password-row">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" id="togglePassword" aria-pressed="false">
                Show
              </button>
            </div>
          </label>

          <div class="form-meta">
            <label class="remember-me">
              <input type="checkbox" id="remember" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="submit-button">Sign in</button>
          <p id="formStatus" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
